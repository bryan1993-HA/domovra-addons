<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Domovra{% endblock %}</title>

  <!-- Injection SAFE (pas d'expressions Jinja dans le JS) -->
  <meta name="domovra:theme" content="{{ SETTINGS.theme|default('auto') }}">
  <meta name="domovra:sidebar" content="{{ '1' if SETTINGS.sidebar_compact else '0' }}">

  <!-- Applique immédiatement thème + sidebar compacte -->
  <script>
    (function () {
      const mTheme = document.querySelector('meta[name="domovra:theme"]');
      const mSide = document.querySelector('meta[name="domovra:sidebar"]');
      const PREF_THEME = (mTheme && mTheme.content) || 'auto';
      const SIDEBAR_MINI = (mSide && mSide.content === '1');

      try {
        if (PREF_THEME === 'light' || PREF_THEME === 'dark') {
          document.body && document.body.setAttribute('data-theme', PREF_THEME);
          document.documentElement.style.colorScheme = PREF_THEME;
          localStorage.setItem('domovra_theme', PREF_THEME);
        } else {
          const saved = localStorage.getItem('domovra_theme');
          if (saved === 'light' || saved === 'dark') {
            document.body && document.body.setAttribute('data-theme', saved);
            document.documentElement.style.colorScheme = saved;
          }
        }
      } catch (e) { }

      if (SIDEBAR_MINI) {
        document.documentElement.classList.add('sidebar-mini');
        document.body && document.body.classList.add('sidebar-mini');
      } else {
        document.documentElement.classList.remove('sidebar-mini');
        document.body && document.body.classList.remove('sidebar-mini');
      }
    })();
  </script>

  <style>
    :root {
      color-scheme: dark;
    }

    body[data-theme="dark"] {
      background: #0f1115;
      color: #e5e7eb;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    * {
      box-sizing: border-box;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* Layout principal */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100dvh;
    }

    aside {
      background: #111315;
      border-right: 1px solid #2a2f36;
      padding: 12px;
      position: relative;
      z-index: 45;
    }

    main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #2a2f36;
      position: sticky;
      top: 0;
      z-index: 40;
      background: inherit;
    }

    .app-title {
      margin: 0;
      font-size: 1.1rem;
      opacity: .9;
    }

    /* Menu */
    .menu {
      display: grid;
      gap: 8px;
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #242932;
      background: #151922;
      border-radius: 10px;
      cursor: pointer;
    }

    .menu a:hover {
      filter: brightness(1.05);
    }

    .menu a.active {
      border-color: #4f46e5;
      box-shadow: 0 0 0 1px #4f46e5 inset;
    }

    .menu .ico {
      width: 22px;
      display: inline-grid;
      place-items: center;
      opacity: .9;
    }

    /* Cartes / grille / formulaires / tables */
    .page {
      padding: 16px;
    }

    .card {
      background: #151922;
      border: 1px solid #242932;
      border-radius: 12px;
      padding: 12px;
    }

    .muted {
      opacity: .7;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid #2d3340;
      background: #0f1320;
      color: #e5e7eb;
      padding: 8px 10px;
    }

    button {
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #242932;
      padding: 8px 10px;
    }

    th {
      background: #121520;
    }

    tbody tr:nth-child(even) {
      background: #121620;
    }

    /* Responsive */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 4;
    }

    @media (max-width:1200px) {
      .card {
        grid-column: span 6;
      }
    }

    @media (max-width:768px) {
      .card {
        grid-column: 1 / -1;
      }
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row>* {
      flex: 1 1 0;
      min-width: 0;
    }

    @media (max-width:768px) {
      .row {
        flex-direction: column;
      }
    }

    .table-responsive {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-responsive table {
      min-width: 720px;
    }

    /* Sidebar off‑canvas <= 1024px */
    @media (max-width:1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        position: fixed;
        inset: 0 auto 0 0;
        width: 260px;
        transform: translateX(-100%);
        transition: transform .25s ease;
        z-index: 70;
      }

      body.sidebar-open aside {
        transform: translateX(0);
        box-shadow: 0 10px 30px rgba(0, 0, 0, .45);
      }
    }

    /* Mode "sidebar compacte" (desktop) */
    @media (min-width:1025px) {
      .sidebar-mini .layout {
        grid-template-columns: 72px 1fr;
      }

      .sidebar-mini aside {
        padding: 12px 8px;
      }

      .sidebar-mini .menu a {
        justify-content: center;
        gap: 0;
      }

      .sidebar-mini .menu a span:not(.ico) {
        display: none;
      }
    }

    /* Hamburger (mobile seulement) */
    .hamburger {
      display: inline-grid;
      place-content: center;
      gap: 4px;
      width: 40px;
      height: 40px;
      border: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 10px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: currentColor;
    }

    @media (min-width:1025px) {
      .hamburger {
        display: none;
      }
    }

    /* Espace avec le switch thème (placé dans les pages) */
    #theme-toggle.theme-switch {
      top: 10px;
      right: 56px;
    }

    @media (max-width:480px) {
      #theme-toggle.theme-switch {
        right: 10px;
        top: 56px;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body data-theme="dark">
  <div class="layout">
    <aside>
      <nav class="menu">
        <a href="{{ BASE }}" class="{% if request.path == BASE %}active{% endif %}">
          <span class="ico">🏠</span> <span>Accueil</span>
        </a>
        <a href="{{ BASE }}locations" class="{% if request.path.startswith(BASE ~ 'locations') %}active{% endif %}">
          <span class="ico">📍</span> <span>Emplacements</span>
        </a>
        <a href="{{ BASE }}products" class="{% if request.path.startswith(BASE ~ 'products') %}active{% endif %}">
          <span class="ico">📦</span> <span>Produits</span>
        </a>
        <a href="{{ BASE }}lots" class="{% if request.path.startswith(BASE ~ 'lots') %}active{% endif %}">
          <span class="ico">🧮</span> <span>Lots</span>
        </a>
        <a href="{{ BASE }}settings" class="{% if request.path.startswith(BASE ~ 'settings') %}active{% endif %}">
          <span class="ico">⚙️</span> <span>Paramètres</span>
        </a>
        <a href="{{ BASE }}journal" class="{% if request.path.startswith(BASE ~ 'journal') %}active{% endif %}">
          <span class="ico">📝</span> <span>Journal</span>
        </a>

      </nav>
    </aside>

    <main>
      <header>
        <button class="hamburger" id="hamburger" aria-label="Ouvrir le menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <h1 class="app-title">Domovra</h1>
        {% block header_right %}{% endblock %}
      </header>

      <section class="page">
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>

  <!-- JS : sidebar mobile -->
  <script>
    (function () {
      const btn = document.getElementById('hamburger');
      if (!btn) return;
      const isMobile = () => matchMedia('(max-width:1024px)').matches;
      const open = () => { document.body.classList.add('sidebar-open'); btn.setAttribute('aria-expanded', 'true'); };
      const close = () => { document.body.classList.remove('sidebar-open'); btn.setAttribute('aria-expanded', 'false'); };
      btn.addEventListener('click', () => (document.body.classList.contains('sidebar-open') ? close() : open()));
      addEventListener('resize', () => { if (!isMobile()) close(); });
      document.querySelector('aside')?.addEventListener('click', (e) => {
        const a = e.target.closest('a'); if (a && isMobile()) close();
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
