<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Domovra{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store" />
  <style>
    :root{ color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color:#e8eaed; background:#111317; }
    .layout { display:grid; grid-template-columns: 240px 1fr; min-height:100vh; }
    aside { background:#0d0f12; border-right:1px solid #23252a; padding:1rem; position:sticky; top:0; height:100vh; }
    .brand { font-weight:800; font-size:1.4rem; margin-bottom:1rem; letter-spacing:.3px; }
    .menu a { display:block; padding:.55rem .7rem; margin:.2rem 0; text-decoration:none; color:#e8eaed; border-radius:10px; border:1px solid #23252a; background:#14171c; }
    .menu a.active { background:#1e232a; border-color:#2f333a; }
    header { display:flex; align-items:center; gap:1rem; border-bottom:1px solid #23252a; padding: .75rem 1rem; position:sticky; top:0; background:#111317; z-index:1; }
    main { padding:1rem 1.25rem; }
    h1 { margin:.2rem 0 1rem; }
    .muted { color:#9aa0a6; }
    .grid { display:grid; gap:1rem; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); margin: .75rem 0 1rem; }
    .card { border:1px solid #2f3237; border-radius:12px; padding:1rem; background:#121419;}
    input, select { width:100%; padding:.55rem .6rem; border-radius:8px; border:1px solid #3a3d43; background:#1f2125; color:#e8eaed; }
    button { padding:.55rem .9rem; border-radius:8px; border:1px solid #3a3d43; background:#2b2f36; color:#e8eaed; cursor:pointer; }
    table { width:100%; border-collapse: collapse; margin-top:.5rem; }
    th, td { padding:.55rem .6rem; border-bottom:1px solid #2f3237; text-align:left; }
    .tag { padding:.2rem .5rem; border-radius:.5rem; font-size:.85rem; }
    .green{ background:#134e19; } .yellow{ background:#6a5b0a; } .red{ background:#6a1a1a; } .unknown{ background:#374151; }
    .row { display:flex; gap:.5rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">Domovra</div>
      <nav class="menu">
        <a href="{{ BASE }}" class="{% if page=='home' %}active{% endif %}">🏠 Accueil</a>
        <a href="{{ BASE }}products" class="{% if page=='products' %}active{% endif %}">📦 Produits</a>
        <a href="{{ BASE }}locations" class="{% if page=='locations' %}active{% endif %}">🏷️ Emplacements</a>
        <a href="{{ BASE }}lots" class="{% if page=='lots' %}active{% endif %}">🧊 Lots</a>
      </nav>
    </aside>
    <div>
      <header>
        <div class="muted">Gestion de stock domestique</div>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
